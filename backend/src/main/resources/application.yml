server:
  port: 8080

spring:
  application:
    name: devtools-intelligence-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/devtools_intelligence
    username: devtools
    password: devtools_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

# ── OpenAI ────────────────────────────────────────────────────────────────────
openai:
  api-key: 
  base-url: https://api.openai.com/v1
  chat-model: gpt-4o-mini
  embedding-model: text-embedding-3-small
  embedding-dimensions: 1536

# ── Jira ──────────────────────────────────────────────────────────────────────
# Paste your new Jira API token below after revoking the old one.
# Generate at: https://id.atlassian.com/manage-api-tokens
jira:
  base-url: https://aitian888.atlassian.net
  email: aitian.888@gmail.com
  api-token: 
  project-key: SCRUM
  similarity-threshold: 0.75

# ── Ingestion ──────────────────────────────────────────────────────────────────
ingestion:
  csv-path: classpath:data/jira_tickets_sample.csv
  json-data-path: classpath:data/sonarqube

# ── CORS ──────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    com.devtools.intelligence: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
