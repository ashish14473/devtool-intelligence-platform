services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devtools-postgres
    environment:
      POSTGRES_DB: devtools_intelligence
      POSTGRES_USER: devtools
      POSTGRES_PASSWORD: devtools_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devtools -d devtools_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
